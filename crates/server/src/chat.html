<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RustRAG</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column;
  }

  /* Header */
  header {
    background: #161b22; border-bottom: 1px solid #30363d; padding: 12px 24px;
    font-size: 13px; color: #8b949e; flex-shrink: 0;
  }
  header strong { color: #58a6ff; margin-right: 8px; }

  /* Messages area */
  #messages {
    flex: 1; overflow-y: auto; padding: 24px;
    display: flex; flex-direction: column; gap: 20px; max-width: 900px; margin: 0 auto; width: 100%;
  }

  .msg { line-height: 1.7; font-size: 15px; word-break: break-word; }
  .msg.user { align-self: flex-end; background: #1f6feb33; border: 1px solid #1f6feb55; padding: 10px 16px; border-radius: 12px; color: #a5dfff; max-width: 75%; }

  .msg.assistant { align-self: flex-start; background: transparent; border: none; padding: 8px 0; max-width: 90%; }
  .msg.assistant h1, .msg.assistant h2, .msg.assistant h3, .msg.assistant h4 { color: #e6edf3; margin: 20px 0 10px 0; font-weight: 600; }
  .msg.assistant h1 { font-size: 1.5em; border-bottom: 1px solid #21262d; padding-bottom: 8px; }
  .msg.assistant h2 { font-size: 1.3em; }
  .msg.assistant h3 { font-size: 1.1em; color: #79c0ff; }

  .msg.assistant p { margin: 8px 0; }

  .msg.assistant ul, .msg.assistant ol { margin: 8px 0; padding-left: 24px; color: #c9d1d9; }
  .msg.assistant li { margin: 4px 0; }
  .msg.assistant li > p { display: inline; }

  .msg.assistant strong { color: #e6edf3; font-weight: 600; }
  .msg.assistant em { color: #a5dfff; font-style: italic; }

  .msg.assistant code {
    background: #161b22; padding: 2px 6px; border-radius: 4px; font-family: 'SF Mono', 'Fira Code', monospace;
    font-size: 0.9em; color: #a5dfff; border: 1px solid #30363d;
  }

  .msg.assistant pre {
    background: #0d1117; border: 1px solid #21262d; padding: 14px; border-radius: 8px;
    margin: 10px 0; overflow-x: auto; font-size: 13px; line-height: 1.5;
  }
  .msg.assistant pre code { background: none; border: none; padding: 0; color: #c9d1d9; font-size: inherit; }

  .msg.assistant blockquote {
    border-left: 3px solid #388bfd; padding: 4px 16px; margin: 10px 0;
    background: #161b22; color: #8b949e; border-radius: 0 4px 4px 0;
  }

  .msg.assistant hr { border: none; border-top: 1px solid #21262d; margin: 20px 0; }

  /* Results list */
  .results-list { margin: 12px 0; display: flex; flex-direction: column; gap: 4px; }
  .result-item { background: #161b22; border: 1px solid #21262d; padding: 8px 12px; border-radius: 6px; font-size: 12px; color: #8b949e; }
  .result-item b { color: #58a6ff; font-weight: 600; }

  /* Input area */
  #input-area {
    background: #161b22; border-top: 1px solid #30363d; padding: 16px 24px; flex-shrink: 0;
    display: flex; gap: 8px; align-items: center; max-width: 900px; margin: 0 auto; width: 100%;
  }
  #input-area span { color: #3fb950; font-weight: bold; margin-right: 4px; user-select: none; font-size: 18px; }
  input[type="text"] { flex: 1; background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 12px 16px; border-radius: 8px; font-size: 15px; outline: none; }
  input[type="text"]:focus { border-color: #388bfd; box-shadow: 0 0 0 3px #1f6feb22; }
  button#send { background: #238636; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; font-size: 15px; font-weight: 500; transition: background 0.2s; }
  button#send:hover { background: #2ea043; }
  button#send:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Loading spinner */
  .loading { color: #3fb950; animation: blink 1s infinite; display: inline-block; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

  /* Welcome */
  .welcome { text-align: center; margin-top: 20vh; transform: translateY(-40%); color: #8b949e; font-size: 16px; }
  .welcome h2 { color: #c9d1d9; margin-bottom: 12px; font-weight: 600; font-size: 1.5em; }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
</style>
</head>
<body>

<header><strong>RustRAG</strong> — Chat with your Rust codebase</header>

<div id="messages">
  <div class="welcome"><h2>🦀 RustRAG</h2>Type a question about your Rust project</div>
</div>

<div id="input-area">
  <span>&gt;</span>
  <input type="text" id="query" placeholder="Ask about your code..." autofocus>
  <button id="send" onclick="sendMessage()">Send</button>
</div>

<script>
const messages = document.getElementById('messages');
const input = document.getElementById('query');
const sendBtn = document.getElementById('send');

input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

function addMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  div.innerHTML = role === 'user' ? escHtml(text) : formatMarkdown(text);
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
  return div;
}

// ------------------------------------------------------------------
// Simple Markdown parser (no external deps)
// ------------------------------------------------------------------
function formatMarkdown(text) {
  if (!text || !text.trim()) return '';

  // Escape HTML first
  let html = escHtml(text);

  // Extract code blocks first to protect them from further processing
  const codeBlocks = [];
  html = html.replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => {
    const idx = codeBlocks.length;
    const langStr = lang ? escHtml(lang) : '';
    codeBlocks.push(`<pre><code class="language-${langStr}">${code.trim()}</code></pre>`);
    return `%%CODEBLOCK${idx}%%`;
  });

  // Inline code: `code` (but not inside pre blocks)
  html = html.replace(/`([^`\n]+)`/g, '<code>$1</code>');

  // Headers
  html = html.replace(/^### (.+)$/gm, '<h3>$1</h3>');
  html = html.replace(/^## (.+)$/gm, '<h2>$1</h2>');
  html = html.replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Bold **text**
  html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');

  // Italic *text* (simple, doesn't handle nested)
  html = html.replace(/(?<!\w)\*([^*]+?)\*(?!\w)/g, '<em>$1</em>');

  // Blockquotes > text
  html = html.replace(/^&gt; (.+)$/gm, '<blockquote>$1</blockquote>');

  // Horizontal rule ---
  html = html.replace(/^---$/gm, '<hr>');

  // Unordered list items -
  html = html.replace(/^- (.+)$/gm, '<li>$1</li>');
  // Wrap consecutive <li> in <ul> (simple approach)
  const liGroups = [];
  let currentLi = '';
  const lines2 = html.split('\n');
  html = lines2.map(line => {
    if (line.startsWith('<li>') && line.endsWith('</li>')) {
      currentLi += (currentLi ? '\n' : '') + line;
      return null; // skip individual <li>, we'll replace the group later
    } else {
      if (currentLi) {
        const result = `<ul>${currentLi}</ul>`;
        currentLi = '';
        liGroups.push(result);
      }
      return line;
    }
  }).filter(Boolean).join('\n');

  // Wrap remaining blocks in <p> tags for non-block content
  html = html.split('\n').map(line => {
    line = line.trim();
    if (!line) return '';
    if (/^<(h[1-6]|ul|ol|pre|blockquote|hr)/.test(line)) return line;
    if (line.startsWith('%%CODEBLOCK')) return line;
    // Check for wrapped list groups
    if (liGroups.includes(line)) return line;
    return `<p>${line}</p>`;
  }).join('\n');

  // Restore code blocks
  html = html.replace(/%%CODEBLOCK(\d+)%%/g, (_, idx) => codeBlocks[parseInt(idx)]);

  return html;
}

function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

async function sendMessage() {
  const query = input.value.trim();
  if (!query) return;
  input.value = '';
  sendBtn.disabled = true;

  // Remove welcome message
  const welcome = messages.querySelector('.welcome');
  if (welcome) welcome.remove();

  addMessage('user', query);

  // Show loading
  const assistantMsg = addMessage('assistant', '<span class="loading">Searching...</span>');

  try {
    // Step 1: Search
    const searchRes = await fetch('/search', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query, top_k: 5 })
    });
    if (!searchRes.ok) throw new Error('Search failed');

    // Step 2: Query LLM with streaming
    const res = await fetch('/query', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ question: query, top_k: 5 })
    });
    if (!res.ok) throw new Error('Query failed');

    const data = await res.json();
    let fullAnswer = '';
    let resultsHtml = '';

    // Search results
    if (data.results && data.results.length > 0) {
      resultsHtml = '<div class="results-list">';
      for (const r of data.results.slice(0, 5)) {
        const text = (r.text || '').substring(0, 80);
        resultsHtml += `<div class="result-item"><b>[${r.score.toFixed(2)}]</b> ${escHtml(r.file_path)}:${r.line_start} - ${escHtml(text)}</div>`;
      }
      resultsHtml += '</div>';
    }

    fullAnswer = (data.answer || '') + '\n' + resultsHtml;
    assistantMsg.innerHTML = formatMarkdown(fullAnswer);

  } catch (err) {
    assistantMsg.innerHTML = `<p style="color:#f85149">Error: ${escHtml(err.message)}</p>`;
  } finally {
    sendBtn.disabled = false;
    input.focus();
  }
}

input.focus();
</script>
</body>
</html>
